

services:
  postgres:
    image: postgres:15-alpine
    container_name: mediflow_postgres
    restart: unless-stopped          # ← ADDED
    environment:
      POSTGRES_DB: mediflow
      POSTGRES_USER: mediflow
      POSTGRES_PASSWORD: mediflow
        
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediflow_redis
    restart: unless-stopped          # ← ADDED
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend.Dockerfile
      network: host
    container_name: mediflow_backend
    restart: unless-stopped          # ← ADDED
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./apps/backend:/app
      - static_files:/app/staticfiles  # ← ADDED (so collectstatic output persists)
    ports:
      - "8000:8000"
    env_file:
      - ./apps/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: mediflow.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      network: host
    container_name: mediflow_frontend
    restart: unless-stopped          # ← ADDED
    command: npm run dev
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
      - playwright-browsers:/ms-playwright
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env.local
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend

  celery:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend.Dockerfile
      network: host
    container_name: mediflow_celery
    restart: unless-stopped
    command: celery -A mediflow worker --loglevel=info --concurrency=2
    volumes:
      - ./apps/backend:/app
    env_file:
      - ./apps/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: mediflow.settings.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  static_files:
  playwright-browsers:
