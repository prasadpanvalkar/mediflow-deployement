services:

  # ── Database ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mediflow_postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Cache / Message Broker ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mediflow_redis
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Django Backend (Gunicorn) ─────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend.Dockerfile
    container_name: mediflow_backend
    restart: unless-stopped
    command:
      - "sh"
      - "-c"
      - "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn mediflow.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    env_file:
      - ./apps/backend/.env
    environment:
      TZ: Asia/Kolkata
      DJANGO_SETTINGS_MODULE: mediflow.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Next.js Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: mediflow_frontend
    restart: unless-stopped
    command: ["sh", "-c", "npm run build && npm start"]
    env_file:
      - ./apps/frontend/.env.local
    environment:
      TZ: Asia/Kolkata
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - internal

  # ── Celery Worker ─────────────────────────────────────────────────────
  celery:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend.Dockerfile
    container_name: mediflow_celery
    restart: unless-stopped
    command: ["celery", "-A", "mediflow", "worker", "--loglevel=info", "--concurrency=2"]
    volumes:
      - media_files:/app/media
    env_file:
      - ./apps/backend/.env
    environment:
      TZ: Asia/Kolkata
      DJANGO_SETTINGS_MODULE: mediflow.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Nginx (Internal Proxy) ────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: mediflow_nginx
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    external: true
    name: mediflow_postgres_data
  redis_data:
    external: true
    name: mediflow_redis_data
  static_files:
  media_files:

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
