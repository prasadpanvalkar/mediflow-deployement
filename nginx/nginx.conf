    events { worker_connections 1024; }
    http {
        upstream backend { server backend:8000; }
        upstream frontend { server frontend:3000; }
        server {
            listen 80;
            location /api/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
            location /admin/ { proxy_pass http://backend; proxy_set_header Host $host; }
            location /static/ { proxy_pass http://backend; }
            location / { proxy_pass http://frontend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        }
    }
